# vim: ft=tmux
# --- Jellybeans Palette ---
# Background: #151515
# Foreground: #e8e8d3
# Selection/Active: #b39066 (Yellow)
# Inactive/Grey: #4b4b4b

set -g mode-style "fg=#151515,bg=#b39066"

set -g message-style "fg=#e8e8d3,bg=#333333"
set -g message-command-style "fg=#e8e8d3,bg=#333333"

set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#8197bf"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#888888,bg=#151515"

set -g status-bg "#151515"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#151515,bg=#e8e8d3,bold] #(whoami) #[fg=#e8e8d3,bg=#151515,nobold,nounderscore,noitalics]"

set -g status-right "#[fg=#333333,bg=#151515,nobold,nounderscore,noitalics]#[fg=#888888,bg=#333333]#[fg=#4b4b4b,bg=#333333,nobold,nounderscore,noitalics]#[fg=#e8e8d3,bg=#4b4b4b]#[fg=#8197bf,bg=#4b4b4b,nobold,nounderscore,noitalics]#[fg=#151515,bg=#8197bf,bold] #h "

setw -g window-status-activity-style "underscore,fg=#888888,bg=#151515"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#888888,bg=#151515"

setw -g window-status-format '#[fg=#151515,bg=#151515]#[default] #I  #{b:pane_current_path} #[fg=#151515,bg=#151515,nobold,nounderscore,noitalics]'

setw -g window-status-current-format '#[fg=#151515,bg=#b39066]#[fg=#151515,bg=#b39066] #I #[fg=#151515,bg=#b39066] #[fg=#151515]#{b:pane_current_path} #[fg=#b39066,bg=#151515,nobold]'
